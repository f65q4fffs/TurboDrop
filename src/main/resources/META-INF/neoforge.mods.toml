# The name of the mod loader
modLoader="javafml"

# The version range of the mod loader
loaderVersion="[4,)"

# The license of your mod
license="LGPLv3"


# A list of mods in this file
[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
description="Videz instantanement de tres gros stockages en faisant tomber les items au sol de maniere performante et securisee."

# Dependency configurations
[[dependencies.${mod_id}]]
modId="neoforge"
mandatory=true
versionRange="[${neo_version},)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
mandatory=true
versionRange="[1.21.1,1.21.2)"
ordering="NONE"
side="BOTH"
